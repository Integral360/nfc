<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Integral360 | Landings Digitales</title>
  <style>
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Arial, sans-serif;
      background: linear-gradient(135deg, #0f0f0f, #1a1a1a);
      color:#fff;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:30px;
    }
    .box{
      max-width:800px;
      width:100%;
      background:rgba(255,255,255,0.04);
      border:1px solid rgba(255,255,255,0.08);
      border-radius:20px;
      padding:50px 30px;
      box-shadow:0 20px 60px rgba(0,0,0,0.35);
    }
    .tag{
      display:inline-block;
      padding:8px 14px;
      border-radius:999px;
      background:rgba(212,175,55,0.12);
      color:#d4af37;
      font-size:14px;
      margin-bottom:18px;
      border:1px solid rgba(212,175,55,0.28);
    }
    h1{
      margin:0 0 15px;
      font-size:clamp(2rem, 4vw, 3.4rem);
      line-height:1.1;
      color:#d4af37;
    }
    p{
      margin:0 auto 28px;
      max-width:620px;
      font-size:1.08rem;
      line-height:1.7;
      color:#e8e8e8;
    }
    .buttons{
      display:flex;
      gap:14px;
      justify-content:center;
      flex-wrap:wrap;
    }
    .btn{
      display:inline-block;
      padding:14px 22px;
      border-radius:12px;
      text-decoration:none;
      font-weight:bold;
      transition:.25s ease;
    }
    .btn-primary{
      background:#d4af37;
      color:#111;
    }
    .btn-primary:hover{
      transform:translateY(-2px);
    }
    .btn-secondary{
      background:transparent;
      color:#fff;
      border:1px solid rgba(255,255,255,0.18);
    }
    .btn-secondary:hover{
      background:rgba(255,255,255,0.05);
    }
    .foot{
      margin-top:28px;
      font-size:14px;
      color:#bdbdbd;
    }
  </style>
</head>
<body>
  <div class="box">
    <div class="tag">Integral360</div>
    <h1>Landings digitales con identidad profesional</h1>
    <p>
      Creamos páginas de presentación para empresas, marcas, profesionales y soluciones
      comerciales con acceso rápido por enlace o tecnología NFC.
    </p>

    <div class="buttons">
      <a class="btn btn-primary" href="https://wa.me/573163119312" target="_blank">Solicitar información</a>
      <a class="btn btn-secondary" href="https://integral360.com.co" target="_blank">Visitar sitio web</a>
    </div>

    <div class="foot">
      Soluciones digitales desarrolladas por Integral360
    </div>
  </div>
</body>
</html>
