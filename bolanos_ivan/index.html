<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Iván Bolaños</title>

<style>

*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:Arial, sans-serif;
background:#0a0a0a;
color:#fff;
display:flex;
justify-content:center;
}

.app{
width:100%;
max-width:430px;
padding:18px;
}

/* HEADER */

.header{
text-align:center;
margin-bottom:15px;
}

.logo{
width:120px;
margin-bottom:10px;
}

.name{
font-size:28px;
font-weight:bold;
}

.name span{
color:#f5c400;
}

/* HERO */

.hero{
background:linear-gradient(145deg,#111,#1c1c1c);
border-radius:25px;
padding:20px;
border:1px solid rgba(255,255,255,.1);
text-align:center;
}

.photo{
width:120px;
height:120px;
border-radius:50%;
object-fit:cover;
border:3px solid #f5c400;
margin-bottom:10px;
}

.subtitle{
color:#bbb;
font-size:14px;
margin-bottom:15px;
}

.actions{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.btn{
padding:14px;
border-radius:15px;
text-decoration:none;
font-weight:bold;
text-align:center;
}

.btn-yellow{
background:#f5c400;
color:#000;
}

.btn-dark{
background:#222;
color:#fff;
border:1px solid #333;
}

/* SELECTORES */

.selector{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:15px;
}

.card{
padding:20px;
border-radius:18px;
text-align:center;
font-weight:bold;
cursor:pointer;
}

.card-arch{
background:#222;
border:1px solid #333;
}

.card-veh{
background:#f5c400;
color:#000;
}

/* SECCIONES */

.section{
margin-top:15px;
padding:15px;
border-radius:20px;
background:#151515;
border:1px solid #2a2a2a;
}

.section h2{
margin-bottom:10px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:8px;
}

.grid img{
width:100%;
height:120px;
object-fit:cover;
border-radius:12px;
}

/* VEHICULOS */

.vehicle{
margin-top:12px;
background:#111;
border-radius:15px;
overflow:hidden;
border:1px solid #333;
}

.vehicle img{
width:100%;
}

.vehicle a{
display:block;
padding:12px;
background:#25D366;
text-align:center;
color:#fff;
text-decoration:none;
font-weight:bold;
}

/* FOOTER */

.footer{
text-align:center;
margin-top:20px;
font-size:12px;
color:#aaa;
}

.footer a{
color:#f5c400;
text-decoration:none;
}

</style>
</head>

<body>

<div class="app">

<!-- LOGO -->
<div class="header">
<img src="assets/logo.jpg" class="logo">
<div class="name">Iván Mauricio <span>Bolaños Muñoz</span></div>
</div>

<!-- HERO -->
<div class="hero">

<img src="assets/foto.jpg" class="photo">

<div class="subtitle">
Arquitecto | Comercialización de vehículos
</div>

<div class="actions">
<a href="https://wa.me/573178821345" class="btn btn-yellow">WhatsApp</a>
<a href="tel:3178821345" class="btn btn-dark">Llamar</a>
</div>

</div>

<!-- SELECTOR -->
<div class="selector">
<div class="card card-arch" onclick="scrollToSection('arquitectura')">
Arquitectura
</div>

<div class="card card-veh" onclick="scrollToSection('vehiculos')">
Vehículos
</div>
</div>

<!-- ARQUITECTURA -->
<div id="arquitectura" class="section">

<h2>Arquitectura & Diseño</h2>

<div class="grid">
<img src="assets/arq1.jpg">
<img src="assets/arq2.jpg">
<img src="assets/arq3.jpg">
<img src="assets/arq4.jpg">
<img src="assets/arq5.jpg">
<img src="assets/arq6.jpg">
</div>

<a href="https://wa.me/573178821345?text=Hola%20quiero%20cotizar%20un%20proyecto"
class="btn btn-yellow" style="margin-top:10px;display:block;">
Cotizar proyecto
</a>

</div>

<!-- VEHICULOS -->
<div id="vehiculos" class="section">

<h2>Vehículos disponibles</h2>

<div class="vehicle">
<img src="assets/vehi1.jpg">
<a href="https://wa.me/573178821345?text=Me%20interesa%20la%20AKT">
Consultar
</a>
</div>

<div class="vehicle">
<img src="assets/vehi2.jpg">
<a href="https://wa.me/573178821345?text=Me%20interesa%20el%20Kia">
Consultar
</a>
</div>

<div class="vehicle">
<img src="assets/vehi3.jpg">
<a href="https://wa.me/573178821345?text=Me%20interesa%20Mitsubishi">
Consultar
</a>
</div>

<div class="vehicle">
<img src="assets/vehi6.jpg">
<a href="https://wa.me/573178821345?text=Me%20interesa%20Fiat">
Consultar
</a>
</div>

</div>

<div class="footer">
Powered by <a href="https://integral360.com.co">Integral360</a>
</div>

</div>

<script>
function scrollToSection(id){
document.getElementById(id).scrollIntoView({behavior:"smooth"});
}
</script>

</body>
</html>
