<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dissfonia | Rituales del Páramo</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

<style>
:root{
  --red:#ff1a1a;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:Arial, Helvetica, sans-serif;
  color:#fff;
  background:#000;
  overflow-x:hidden;
}

/* FONDO PARAMO */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:url('fondo.jpg') center/cover no-repeat;
  filter:brightness(0.25) contrast(1.2);
  z-index:-2;
}

/* NIEBLA ANIMADA */
body::after{
  content:"";
  position:fixed;
  inset:0;
  background:radial-gradient(circle at 20% 30%,rgba(255,0,0,0.1),transparent 60%),
             radial-gradient(circle at 80% 70%,rgba(255,0,0,0.08),transparent 60%);
  animation:fog 12s infinite alternate;
  z-index:-1;
}

@keyframes fog{
  0%{opacity:0.4;}
  100%{opacity:0.7;}
}

.container{
  max-width:460px;
  margin:auto;
  padding:16px;
}

.hero{
  position:relative;
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 0 60px rgba(255,0,0,0.4);
}

.hero img{
  width:100%;
}

.overlay{
  position:absolute;
  inset:0;
  background:linear-gradient(180deg,transparent,rgba(0,0,0,0.95));
}

.hero-content{
  position:absolute;
  bottom:20px;
  left:20px;
}

h1{
  font-size:32px;
  letter-spacing:3px;
  text-shadow:0 0 15px red;
}

.tag{
  color:#bbb;
  font-size:13px;
}

.btn{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:10px;
  background:linear-gradient(135deg,#ff1a1a,#5a0000);
  padding:14px;
  border-radius:14px;
  margin-top:15px;
  text-decoration:none;
  color:white;
  font-weight:bold;
  box-shadow:0 0 30px rgba(255,0,0,0.5);
}

.section{
  margin-top:20px;
  padding:16px;
  border-radius:18px;
  background:rgba(0,0,0,0.75);
  backdrop-filter:blur(6px);
  border:1px solid rgba(255,0,0,0.2);
  box-shadow:0 0 20px rgba(255,0,0,0.1);
}

.section h2{
  color:#ff1a1a;
  margin-bottom:10px;
}

.player iframe{
  border-radius:12px;
}

.text{
  font-size:14px;
  line-height:1.6;
  color:#ddd;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.icon-btn{
  display:flex;
  justify-content:center;
  align-items:center;
  height:55px;
  border-radius:12px;
  background:#111;
  font-size:22px;
  transition:0.2s;
}

.icon-btn:hover{
  transform:scale(1.1);
  color:#ff1a1a;
}

.footer{
  text-align:center;
  margin-top:20px;
  font-size:12px;
  color:#666;
}

</style>
</head>

<body>

<div class="container">

<div class="hero">
<img src="album.jpg">
<div class="overlay"></div>
<div class="hero-content">
<h1>DISSFONIA</h1>
<div class="tag">Rituales del Páramo</div>
<a href="https://wa.me/573000000000" class="btn">
<i class="fab fa-whatsapp"></i> Booking
</a>
</div>
</div>

<div class="section">
<h2>Spotify</h2>
<div class="player">
<iframe src="https://open.spotify.com/embed/album/0PcdaxUm5bCMMEmZDjUMQ5" height="152"></iframe>
</div>
</div>

<div class="section">
<h2>YouTube</h2>
<div class="player">
<iframe height="200" src="https://www.youtube.com/embed/HVdBPqOE6Cg"></iframe>
</div>
</div>

<div class="section">
<h2>Sobre el álbum</h2>
<p class="text">
Un homenaje al metal de Ipiales. Sonido, historia y resistencia del sur.
</p>
</div>

<div class="section">
<h2>Integrantes</h2>
<p class="text">
Luis Eduardo Posso<br>
Nicolás Posso<br>
Cristian Trejo<br>
Giovanny Rojas
</p>
</div>

<div class="section">
<h2>Redes</h2>
<div class="grid">
<a href="#" class="icon-btn"><i class="fab fa-instagram"></i></a>
<a href="#" class="icon-btn"><i class="fab fa-facebook"></i></a>
</div>
</div>

<div class="footer">
Integral360 · Metal Landing
</div>

</div>

</body>
</html>

</body>
</html>
