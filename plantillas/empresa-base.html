<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nombre Empresa</title>

  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      font-family:Arial, sans-serif;
      background:#0f0f0f;
      color:white;
    }

    /* HERO */
    .hero{
      text-align:center;
      padding:60px 20px;
    }

    .hero img{
      width:120px;
      border-radius:20px;
      margin-bottom:20px;
    }

    h1{
      color:#d4af37;
      font-size:2.2rem;
    }

    .subtitle{
      margin-top:10px;
      color:#ccc;
    }

    /* BOTONES */
    .buttons{
      margin-top:25px;
      display:flex;
      justify-content:center;
      gap:15px;
      flex-wrap:wrap;
    }

    .btn{
      padding:12px 18px;
      border-radius:10px;
      text-decoration:none;
      font-weight:bold;
    }

    .whatsapp{
      background:#25D366;
      color:white;
    }

    .call{
      background:#d4af37;
      color:black;
    }

    /* SECCIONES */
    .section{
      padding:40px 20px;
      text-align:center;
    }

    .section h2{
      color:#d4af37;
      margin-bottom:15px;
    }

    .cards{
      display:flex;
      flex-wrap:wrap;
      gap:20px;
      justify-content:center;
      margin-top:20px;
    }

    .card{
      background:#1a1a1a;
      padding:20px;
      border-radius:15px;
      width:250px;
    }

    /* FOOTER */
    .footer{
      text-align:center;
      padding:30px;
      font-size:14px;
      color:#aaa;
    }
  </style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <img src="assets/logo.jpg" alt="logo">
  <h1>Nombre Empresa</h1>
  <p class="subtitle">Tu propuesta de valor aquí</p>

  <div class="buttons">
    <a href="https://wa.me/57XXXXXXXXXX" class="btn whatsapp">WhatsApp</a>
    <a href="tel:XXXXXXXXXX" class="btn call">Llamar</a>
  </div>
</div>

<!-- QUIENES SOMOS -->
<div class="section">
  <h2>¿Quiénes somos?</h2>
  <p>
    Descripción corta de la empresa. Qué hacen, a quién ayudan y por qué son buenos.
  </p>
</div>

<!-- SERVICIOS -->
<div class="section">
  <h2>Servicios</h2>

  <div class="cards">
    <div class="card">Servicio 1</div>
    <div class="card">Servicio 2</div>
    <div class="card">Servicio 3</div>
  </div>
</div>

<!-- CTA FINAL -->
<div class="section">
  <h2>Contáctanos</h2>
  <p>Estamos listos para ayudarte</p>

  <div class="buttons">
    <a href="https://wa.me/57XXXXXXXXXX" class="btn whatsapp">Escribir por WhatsApp</a>
  </div>
</div>

<!-- FOOTER -->
<div class="footer">
  Powered by Integral360
</div>

</body>
</html>
