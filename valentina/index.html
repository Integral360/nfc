<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Identificación NFC - Valentina</title>

<style>
:root{
  --orange:#ff8a00;
  --purple:#7b2ff7;
  --green:#25D366;
  --blue:#2f80ed;
}

*{box-sizing:border-box;}

body{
  margin:0;
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:
    radial-gradient(circle at top left, rgba(255,138,0,.3), transparent 30%),
    radial-gradient(circle at bottom right, rgba(123,47,247,.3), transparent 35%),
    linear-gradient(145deg,#fff6e8,#f4edff);
  display:flex;
  justify-content:center;
  padding:15px;
}

.phone{
  width:100%;
  max-width:420px;
  border-radius:30px;
  overflow:hidden;
  background:rgba(255,255,255,.9);
  backdrop-filter:blur(15px);
  box-shadow:0 25px 60px rgba(0,0,0,.2);
}

.hero{
  text-align:center;
  padding:30px 20px 25px;
  background:linear-gradient(135deg,var(--orange),var(--purple));
  color:white;
  position:relative;
}

.hero::before{
  content:"🏀";
  position:absolute;
  font-size:120px;
  opacity:.1;
  right:-10px;
  top:10px;
}

.photo{
  width:95px;
  height:95px;
  border-radius:50%;
  object-fit:cover;
  object-position:center 30%;
  margin:15px auto;
  display:block;
  border:4px solid white;
  box-shadow:0 10px 25px rgba(0,0,0,.25);
}

h1{
  margin:5px 0;
  font-size:32px;
}

.subtitle{
  font-size:14px;
  opacity:.9;
}

.club{
  margin-top:10px;
  display:inline-block;
  background:rgba(255,255,255,.2);
  padding:8px 14px;
  border-radius:20px;
  font-weight:bold;
}

.content{
  padding:18px;
}

.info{
  background:#fff8ec;
  padding:15px;
  border-radius:18px;
  text-align:center;
  font-size:14px;
  margin-bottom:15px;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.btn{
  padding:14px;
  border-radius:18px;
  text-decoration:none;
  color:white;
  font-weight:bold;
  text-align:center;
  box-shadow:0 8px 20px rgba(0,0,0,.15);
}

.call{background:linear-gradient(135deg,#ff8a00,#ff5f6d);}
.whatsapp{background:linear-gradient(135deg,#25D366,#128C7E);}
.location{background:linear-gradient(135deg,#2f80ed,#56ccf2);}

.card{
  margin-top:15px;
  padding:15px;
  background:white;
  border-radius:18px;
  box-shadow:0 10px 25px rgba(0,0,0,.08);
}

.card h2{
  margin-bottom:10px;
}

.row{
  display:flex;
  justify-content:space-between;
  padding:8px 0;
  border-bottom:1px solid #eee;
}

.row:last-child{border-bottom:none;}

.sport{
  background:linear-gradient(135deg,#1b1230,#42206f);
  color:white;
}

.footer{
  text-align:center;
  font-size:12px;
  color:#777;
  padding:15px;
}
</style>
</head>

<body>

<div class="phone">

  <div class="hero">
    <img src="foto1.jpeg" class="photo">
    <h1>Valentina</h1>
    <div class="subtitle">Identificación personal</div>
    <div class="club">🏀 Club SYC</div>
  </div>

  <div class="content">

    <div class="info">
      Esta manilla permite identificar y contactar a su familia de forma rápida.
    </div>

    <div class="grid">
      <a class="btn call" href="tel:3174250647">📞 Mamá</a>
      <a class="btn call" href="tel:3163641863">📞 Papá</a>
      <a class="btn whatsapp" href="https://wa.me/573174250647">💬 WhatsApp</a>
      <a class="btn location" href="#" onclick="sendLocation()">📍 Ubicación</a>
    </div>

    <div class="card">
      <h2>Información</h2>
      <div class="row"><span>Edad</span><b>11 años</b></div>
      <div class="row"><span>Tipo de sangre</span><b>O+</b></div>
      
      <div class="row"><span>Ciudad</span><b>Ipiales</b></div>
    </div>

    <div class="card sport">
      <h2>Perfil deportivo</h2>
      <div class="row"><span>Deporte</span><b>Baloncesto</b></div>
      <div class="row"><span>Club</span><b>SYC</b></div>
    </div>

  </div>

  <div class="footer">
    Powered by Integral360
  </div>

</div>

<script>
function sendLocation(){
  if(!navigator.geolocation){
    alert("Ubicación no disponible");
    return;
  }

  navigator.geolocation.getCurrentPosition(pos=>{
    const link = `https://maps.google.com/?q=${pos.coords.latitude},${pos.coords.longitude}`;
    window.location.href = `https://wa.me/573000000000?text=Ubicación:%20${link}`;
  });
}
</script>

</body>
</html>
