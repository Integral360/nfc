<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Decorcerámica</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

body{
  background:#0b0f1a;
  display:flex;
  justify-content:center;
  color:#fff;
}

.app{
  width:100%;
  max-width:430px;
}

/* HERO */
.hero{
  background:linear-gradient(rgba(0,0,0,.5),rgba(0,0,0,.85)),
  url("fachada.jpg");
  background-size:cover;
  background-position:center;
  padding:30px 20px;
  text-align:center;
}

.logo{
  width:95px;
  background:#fff;
  border-radius:20px;
  padding:10px;
  margin-bottom:10px;
}

.hero h1{font-size:24px;}
.hero p{font-size:14px;color:#ddd;margin-top:5px;}

/* ICONOS APP */
.icons{
  display:flex;
  justify-content:center;
  gap:15px;
  margin-top:15px;
  flex-wrap:wrap;
}

.icon-btn{
  width:60px;
  height:60px;
  border-radius:18px;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#fff;
  text-decoration:none;
  transition:.2s;
}

.icon-btn img{
  width:30px;
  height:30px;
}

.icon-btn:hover{
  transform:scale(1.1);
}

/* SECCIONES */
.section{
  padding:20px;
}

.section h2{
  margin-bottom:15px;
}

/* CARRUSEL */
.carousel{
  display:flex;
  overflow-x:auto;
  gap:10px;
  scroll-snap-type:x mandatory;
}

.carousel img{
  width:80%;
  border-radius:15px;
  scroll-snap-align:center;
}

/* CATEGORIAS */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.card{
  background:#141a2a;
  padding:15px;
  border-radius:15px;
  text-align:center;
}

/* ENCUESTA */
.form-link{
  display:block;
  background:linear-gradient(135deg,#1e88e5,#0d47a1);
  color:#fff;
  padding:15px;
  border-radius:15px;
  text-align:center;
  text-decoration:none;
  font-weight:bold;
}

.footer{
  text-align:center;
  font-size:12px;
  color:#aaa;
  padding:20px;
}
</style>

</head>

<body>

<div class="app">

<!-- HERO -->
<section class="hero">
  <img src="logo.PNG" class="logo">
  <h1>Decorcerámica S.A.S</h1>
  <p>En construcción y acabados somos la solución ideal</p>

  <!-- ICONOS -->
  <div class="icons">

    <a class="icon-btn" href="https://wa.me/573229653919">
      <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png">
    </a>

    <a class="icon-btn" href="tel:3176903666">
      <img src="https://cdn-icons-png.flaticon.com/512/724/724664.png">
    </a>

    <a class="icon-btn" href="https://maps.app.goo.gl/hA574zVuZMo9YPAg8" target="_blank">
      <img src="https://cdn-icons-png.flaticon.com/512/684/684908.png">
    </a>

    <a class="icon-btn" href="https://www.facebook.com/DecorceramicaIpiales/photos" target="_blank">
      <img src="https://cdn-icons-png.flaticon.com/512/733/733547.png">
    </a>

    <a class="icon-btn" href="https://www.instagram.com/decorceramicaipiales/" target="_blank">
      <img src="https://cdn-icons-png.flaticon.com/512/733/733558.png">
    </a>

  </div>

</section>

<!-- CARRUSEL -->
<section class="section">
  <h2>Productos destacados</h2>

  <div class="carousel">
    <img src="producto1.jpg">
    <img src="producto2.jpg">
    <img src="producto3.jpg">
    <img src="producto4.jpg">
    <img src="producto5.jpg">
    <img src="producto6.jpg">
    <img src="producto7.jpg">
    <img src="producto8.jpg">
    <img src="producto9.jpg">
    <img src="producto10.jpg">
  </div>
</section>

<!-- CATEGORIAS -->
<section class="section">
  <h2>Categorías</h2>

  <div class="grid">
    <div class="card">Cerámica</div>
    <div class="card">Grifería</div>
    <div class="card">Baños</div>
    <div class="card">Pegantes</div>
  </div>
</section>

<!-- ENCUESTA -->
<section class="section">
  <h2>Tu opinión es importante</h2>

  <a class="form-link" href="https://forms.gle/AQUI_TU_FORMULARIO" target="_blank">
    Responder encuesta y ganar beneficios
  </a>
</section>

<div class="footer">
  Demo NFC - Integral360
</div>

</div>

</body>
</html>
